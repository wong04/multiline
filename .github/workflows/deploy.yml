name: Deploy to Railway

# Reliable push-to-deploy: run tests, then deploy via the Railway CLI (`railway up`),
# which is far more dependable than Railway's native GitHub builder on the hobby plan.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: uv run pytest -q

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy (with retry)
        env:
          # Set EITHER one in repo secrets:
          #   RAILWAY_TOKEN      = a project token (Project → Settings → Tokens)
          #   RAILWAY_API_TOKEN  = an account token (https://railway.com/account/tokens)
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          PROJECT_ID: 8847a0fc-ed72-41f7-9d35-0f0a98cf3a33
        run: |
          if [ -z "$RAILWAY_TOKEN" ] && [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "::error::No Railway token. Add RAILWAY_TOKEN (project) or RAILWAY_API_TOKEN (account) in repo Settings → Secrets → Actions."
            exit 1
          fi
          # Linking is required for an account token; harmless with a project token.
          railway link --project "$PROJECT_ID" --environment production --service multiline || true
          for i in 1 2 3; do
            echo "── Deploy attempt $i ──"
            if railway up --service multiline --ci; then
              echo "Deploy succeeded on attempt $i"
              exit 0
            fi
            echo "Attempt $i failed; retrying in 15s…"
            sleep 15
          done
          echo "::error::All deploy attempts failed"
          exit 1
